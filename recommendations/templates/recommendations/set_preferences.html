{% extends 'recommendations/base.html' %}

{% block content %}
<div class="recommendations-container">
    <h1 class="page-title"><i class="fas fa-star"></i> Set Your Preferences</h1>
    
    <div class="steps-indicator">
        <div class="step completed"><span>✓</span> Enter Details</div>
        <div class="step active"><span>2</span> Set Preferences</div>
        <div class="step"><span>3</span> View Results</div>
    </div>
    
    <div class="form-section">
        <h2><i class="fas fa-sliders-h"></i> Your Preferences</h2>
        
        <form method="POST" action="{% url 'show_results' %}" class="preferences-form">
            {% csrf_token %}
            
            <!-- Hidden fields with student data -->
            <input type="hidden" name="studentName" value="{{ student.name }}">
            <input type="hidden" name="studentEmail" value="{{ student.email }}">
            <input type="hidden" name="marks" value="{{ student.marks }}">
            <input type="hidden" name="category" value="{{ student.category }}">
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-book"></i> Preferred Course</label>
                    <select name="preferred_course" required>
                        <option value="">Select Course</option>
                        {% for course in all_courses %}
                        <option value="{{ course }}">{{ course }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Preferred Location</label>
                    <select name="preferred_location">
                        <option value="">Any Location</option>
                        {% for location in locations %}
                        <option value="{{ location }}">{{ location }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-rupee-sign"></i> Annual Budget (₹)</label>
                    <input type="number" name="budget" min="0" step="10000" value="200000">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-star"></i> Minimum Rating</label>
                    <select name="min_rating">
                        <option value="0">Any Rating</option>
                        <option value="3">3+ Stars</option>
                        <option value="4">4+ Stars</option>
                    </select>
                </div>
            </div>
            
            <div class="form-actions">
                <a href="{% url 'generate_recommendations' %}" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button type="submit" class="btn btn-generate">
                    <i class="fas fa-magic"></i> Show Results
                </button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-back {
    padding: 12px 30px;
    background: #6c757d;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.btn-back:hover {
    background: #5a6268;
}
</style>
{% endblock %}
